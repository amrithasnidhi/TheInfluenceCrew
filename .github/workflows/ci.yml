# ============================================================
# CI Pipeline — TheInfluenceCrew
# Runs on: every push and every pull request to main
# Purpose: Validate code quality, security, dependencies, and
#          Streamlit app on every code change.

# ============================================================

name: CI — Build & Validate

on:
  push:
    branches: ["**"]          # Runs on ALL branches when pushed
  pull_request:
    branches: [main]          # Runs on PRs targeting main

jobs:
  # ----------------------------------------------------------
  # JOB 1: Dependency Check
  # Ensures all packages in requirements.txt install cleanly
  # ----------------------------------------------------------
  dependency-check:
    name: 📦 Dependency Installation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"                 # Cache pip downloads for speed


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify key imports
        run: |
          python -c "
          import pandas, numpy, matplotlib, seaborn
          import sklearn, scipy, openpyxl, streamlit, wordcloud, fpdf
          print('✅ All imports successful')
          "

  # ----------------------------------------------------------
  # JOB 2: Security Scan (Bandit)
  # Checks for common security vulnerabilities in code
  # ----------------------------------------------------------
  security:
    name: 🛡️ Security Sanity Scan
    runs-on: ubuntu-latest
    needs: dependency-check
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r . -ll -ii


  # ----------------------------------------------------------
  # JOB 2: Code Linting
  # Checks Python code quality using flake8
  # ----------------------------------------------------------
  lint:
    name: 🔍 Code Linting (flake8)
    runs-on: ubuntu-latest
    needs: dependency-check       # Only runs if deps installed OK

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"


      - name: Install linting tools
        run: |
          pip install flake8

      - name: Lint streamlit_dashboard.py
        run: |
          flake8 streamlit_dashboard.py \
            --max-line-length=120 \
            --ignore=E302,E303,W503 \
            --statistics
        continue-on-error: true     # Warn but don't fail on style issues

      - name: Syntax check (strict)
        run: |
          python -m py_compile streamlit_dashboard.py
          echo "✅ streamlit_dashboard.py — syntax OK"

  # ----------------------------------------------------------
  # JOB 3: Streamlit App Health Check
  # Ensures the Streamlit app can start without errors
  # ----------------------------------------------------------
  streamlit-check:
    name: 🚀 Streamlit App Check
    runs-on: ubuntu-latest
    needs: dependency-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"


      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Streamlit app loads correctly
        run: |
          # Start the Streamlit server in the background
          streamlit run streamlit_dashboard.py \
            --server.headless=true \
            --server.port=8501 &
          STREAMLIT_PID=$!

          # Wait a few seconds for it to initialize
          sleep 10

          # Check if the process is still running (healthy)
          if kill -0 $STREAMLIT_PID 2>/dev/null; then
            echo "✅ Streamlit app started successfully on port 8501"
            kill $STREAMLIT_PID
          else
            echo "❌ Streamlit app failed to start"
            exit 1
          fi

  # ----------------------------------------------------------
  # JOB 4: Jupyter Notebook Validation
  # Executes the entire notebook to catch runtime errors
  # ----------------------------------------------------------
  notebook-validation:
    name: 📓 Notebook Execution Validation
    runs-on: ubuntu-latest
    needs: dependency-check

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"


      - name: Install dependencies + nbconvert
        run: |
          pip install -r requirements.txt
          pip install jupyter nbconvert

      - name: Execute notebook (headless)
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=300 \
            --output executed_output.ipynb \
            influencer_analysis.ipynb
          echo "✅ Notebook executed successfully without errors"

      - name: Upload executed notebook as artifact
        uses: actions/upload-artifact@v4
        if: always()              # Upload even if execution failed
        with:
          name: executed-notebook
          path: executed_output.ipynb
          retention-days: 7       # Keep for 7 days for debugging
