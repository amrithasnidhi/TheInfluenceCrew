# ============================================================
# CD Pipeline — The Influence Crew
# Runs on: push to main only
# Purpose: Deployment to live environments (Website & Sync)
# ============================================================

name: CD — Live Deployment

on:
  push:
    branches: [main]          # Run only on pushing to main
  workflow_dispatch:          # Allow manual triggers for deployment

# Permissions for GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # 1. Pre-deployment check: Ensure latest code is still healthy
  pre-deploy:
    name: 🛡️ Pre-deploy Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install jupyter nbconvert pypandoc

      - name: Quick Health Check
        run: |
          python -m py_compile streamlit_dashboard.py
          jupyter nbconvert --to html --template classic --output index.html influencer_analysis.ipynb

          echo "✅ Pre-deploy validation successful"

  # 2. Deploy Analytical Website (GitHub Pages)
  deploy-website:
    name: 🚀 CD — Deploy Analytical Website
    runs-on: ubuntu-latest
    needs: pre-deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

          cache: "pip"

      - name: Install website tools
        run: |
          pip install -r requirements.txt
          pip install jupyter nbconvert pypandoc

      - name: Prepare Site Directory
        run: mkdir -p _site

      - name: Convert Notebook to HTML Site
        run: |
          jupyter nbconvert --to html --template classic \
            --output-dir=_site \
            --output index.html \
            influencer_analysis.ipynb
          cp -r *.png _site/ || true
          cp Group5_Report.pdf _site/ || true

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # 3. Synchronize Production Branch (Streamlit Safeguard)
  sync-production:
    name: 🔄 CD — Sync Production Branch
    runs-on: ubuntu-latest
    needs: pre-deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Push to production branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git push -f origin main:production

